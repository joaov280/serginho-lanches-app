<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Serginho Lanches</title>
    <style>
        body { background: #0f0f11; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .painel { background: #1c1c1e; padding: 30px; border-radius: 20px; border: 1px solid #27272a; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 10px; font-size: 1.4rem; color: #fff; }
        .status-display { padding: 15px; border-radius: 12px; margin: 20px 0; font-weight: bold; border: 1px solid transparent; text-transform: uppercase; }
        .st-aberto { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: #10b981; }
        .st-fechado { background: rgba(230, 36, 41, 0.1); color: #e62429; border-color: #e62429; }
        .st-auto { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-color: #3b82f6; }
        button { width: 100%; padding: 15px; margin-bottom: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-abrir { background: #10b981; color: #000; }
        .btn-fechar { background: #e62429; color: #fff; }
        .btn-auto { background: #27272a; color: #a1a1aa; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="painel">
    <h2>Controle Serginho</h2>
    <p style="color: #a1a1aa; font-size: 0.85rem;">Status manual do site</p>
    
    <div id="status-preview" class="status-display st-auto">Carregando...</div>

    <button class="btn-abrir" onclick="mudarStatus('aberto')">ABRIR LOJA</button>
    <button class="btn-fechar" onclick="mudarStatus('fechado')">FECHAR LOJA</button>
    <button class="btn-auto" onclick="mudarStatus('auto')">MODO AUTOMÁTICO</button>
    
    <p style="font-size: 0.7rem; color: #52525b; margin-top: 15px;">Atenção: A mudança reflete para quem estiver no mesmo navegador/dispositivo.</p>
</div>

<script>
    function mudarStatus(v) {
        if(v === 'auto') localStorage.removeItem('serginho_status_manual');
        else localStorage.setItem('serginho_status_manual', v);
        atualizarUI();
    }

    function atualizarUI() {
        const s = localStorage.getItem('serginho_status_manual');
        const box = document.getElementById('status-preview');
        if(s === 'aberto') {
            box.innerText = "Status: ABERTO";
            box.className = "status-display st-aberto";
        } else if(s === 'fechado') {
            box.innerText = "Status: FECHADO";
            box.className = "status-display st-fechado";
        } else {
            box.innerText = "Status: AUTOMÁTICO";
            box.className = "status-display st-auto";
        }
    }
    atualizarUI();
</script>
</body>
</html>
