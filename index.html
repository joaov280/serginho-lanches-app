        :root {
            --bg-color: #0f0f11;
            --surface: #1c1c1e;
            --surface-hover: #2c2c2e;
            --primary: #e62429;
            --primary-glow: rgba(230, 36, 41, 0.3);
            --text-title: #ffffff;
            --text-body: #a1a1aa;
            --success: #10b981;
            --border: #27272a;

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-color); color: var(--text-title); padding-bottom: 100px; }

        /* --- HERO HEADER --- */
        .hero {
            position: relative; height: 220px;

        }

        .loja-info { position: relative; z-index: 2; display: flex; align-items: center; gap: 15px; }
        .logo-wrapper {
            width: 105px; height: 105px; border-radius: 50%; border: 2px solid var(--primary); 
            background: #fff; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .loja-logo { width: 100%; height: 100%; object-fit: contain; transform: scale(1.7) translateY(5%); }
        .loja-textos h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
        .loja-textos p { color: #d4d4d8; font-size: 0.85rem; margin-top: 4px; display: flex; align-items: center; gap: 5px; }
        
        .badge-aberto { background: var(--success); color: #000; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .badge-fechado { background: var(--primary); color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }

        /* --- NAV DE CATEGORIAS FIXA --- */
        .category-nav {
            position: sticky; top: 0; z-index: 100; background: rgba(15, 15, 17, 0.95); backdrop-filter: blur(10px);
            padding: 15px 20px; display: flex; overflow-x: auto; gap: 10px; border-bottom: 1px solid var(--border);
            scroll-behavior: smooth;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: var(--surface); color: var(--text-body); border: 1px solid var(--border); 
            padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; white-space: nowrap; cursor: pointer; transition: 0.3s;
        }
        .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 10px var(--primary-glow); }

        /* --- CONTAINER E CARDS --- */
        .container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
        .section-title { font-size: 1.2rem; font-weight: 700; margin: 30px 0 15px 0; color: var(--text-title); scroll-margin-top: 80px; }

        .product-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 16px;
            display: flex; justify-content: space-between; gap: 15px; cursor: pointer; transition: 0.2s;
        }
        .product-card:active { transform: scale(0.98); border-color: var(--primary); }
        .product-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .product-info h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
        .product-info p { font-size: 0.85rem; color: var(--text-body); line-height: 1.4; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .price-row { display: flex; align-items: center; gap: 8px; }
        .price { font-weight: 700; color: var(--success); font-size: 1.1rem; }
        
        .product-img {
            width: 85px; height: 85px; border-radius: 12px; object-fit: cover;
            background: #27272a url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%2352525b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>') no-repeat center;
        }

        /* --- CARRINHO BARRA --- */
        .cart-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); border-top: 1px solid var(--border);
            padding: 15px 20px; display: none; justify-content: center; z-index: 1000; animation: slideUp 0.3s ease;
        }
        .cart-bar-inner { max-width: 600px; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .cart-resume { display: flex; flex-direction: column; }
        .cart-resume small { color: var(--text-body); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;}
        .cart-resume strong { font-size: 1.4rem; color: #fff; }
        .checkout-btn { background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; }

        /* --- MODAIS GERAIS --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; align-items: flex-end; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: var(--bg-color); width: 100%; max-width: 600px; border-radius: 24px 24px 0 0; padding: 25px 20px;
            animation: slideUp 0.3s ease; border-top: 1px solid var(--border); max-height: 90vh; overflow-y: auto;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 1.3rem; }
        .close-btn { background: var(--surface); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }

        .extra-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .mini-qtd { display: flex; align-items: center; gap: 8px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); padding: 4px; }
        .mini-qtd button { background: var(--border); border: none; color: white; width: 28px; height: 28px; font-size: 1.1rem; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center;}
        .mini-qtd span { font-weight: bold; font-size: 0.95rem; width: 20px; text-align: center; }

        .qtd-seletor { display: flex; align-items: center; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .qtd-seletor button { background: none; border: none; color: white; padding: 15px 20px; font-size: 1.2rem; cursor: pointer; }
        .qtd-seletor span { font-weight: bold; font-size: 1.1rem; width: 30px; text-align: center; }

        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-body); margin-bottom: 6px; font-weight: 600;}
        .input-group input, .input-group select {
            width: 100%; padding: 16px; background: var(--surface); color: white;
            border: 1px solid var(--border); border-radius: 12px; font-size: 1rem; outline: none;

        .btn-wpp { width: 100%; background: var(--success); color: #000; padding: 16px; border-radius: 12px; border: none; font-weight: 800; font-size: 1.1rem; margin-top: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        .cart-item-review { background: var(--surface); padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);}

    </style>
</head>

            </div>

            <div class="input-group">
                <label>Alguma observação?</label>
                <input type="text" id="mp-obs" placeholder="Ex: Tirar cebola, maionese à parte...">
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <div class="qtd-seletor">
                    <button onclick="mudarQtdModal(-1)">-</button>
                    <span id="mp-qtd">1</span>

                    Adicionar <span id="mp-btn-total"></span>
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-checkout">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Sua Sacola</h2>

            <div id="lista-revisao-sacola" style="margin-bottom: 25px;"></div>

            <h3 style="margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 5px;">Dados da Entrega</h3>
            
            <div class="input-group"><label>Seu Nome</label><input type="text" id="cli-nome" placeholder="Ex: João da Silva"></div>
            
            <div class="input-group">
                <label>Como deseja receber?</label>
                <select id="cli-tipo" onchange="alternarCampos()">
                    <option value="Entrega" selected>Quero receber em casa </option>
                    <option value="Retirada">Vou buscar no balcão </option>
                </select>
            </div>

            <div id="div-entrega-automatica">
                <div class="input-group">
                    <label>CEP (Busca Automática)</label>
                    <input type="text" id="cli-cep" placeholder="00000-000" maxlength="9" onblur="buscarCEP()">
                    <span id="cep-status" class="cep-status"></span>
                </div>
                <div class="input-group"><label>Rua e Número</label><input type="text" id="cli-end" placeholder="Rua e Número"></div>
                <div class="input-group"><label>Bairro</label><input type="text" id="cli-bairro" placeholder="Bairro"></div>
            </div>

            <div class="input-group">
                <label>Forma de Pagamento</label>
                <select id="cli-pag" onchange="alternarCampos()">
                    <option value="" disabled selected>Escolha como pagar...</option>
                    <option value="Pix">Pix </option>
                    <option value="Cartão">Cartão </option>
                    <option value="Dinheiro">Dinheiro Físico</option>
                </select>
            </div>

            <div class="input-group" id="div-troco" style="display: none;"><label>Precisa de troco para quanto?</label><input type="number" id="cli-troco"></div>

            <button class="btn-wpp" onclick="enviarPedido()"><i class="fa-brands fa-whatsapp"></i> Fazer Pedido</button>
        </div>
    </div>

            { id: "beb_cerveja", cat: "Bebidas", nome: "Cerveja Lata", desc: "Cerveja Gelada 350ml", preco: 6.00 },

            { id: "suc_1", cat: "Sucos", nome: "Suco de Laranja", desc: "Copo 500ml", preco: 12.00 },
            { id: "suc_2", cat: "Sucos", nome: "Suco de Limão", desc: "Copo 500ml", preco: 12.00 },
            { id: "suc_3", cat: "Sucos", nome: "Limonada Suíça", desc: "Copo 500ml", preco: 15.00 },
            { id: "suc_4", cat: "Sucos", nome: "Morango c/ Água", desc: "Copo 500ml", preco: 12.00 },
            { id: "suc_5", cat: "Sucos", nome: "Morango c/ Leite Condensado", desc: "Copo 500ml", preco: 15.00 },
            { id: "suc_6", cat: "Sucos", nome: "Laranja c/ Morango", desc: "Copo 500ml", preco: 15.00 }
        ];

        let carrinho = JSON.parse(localStorage.getItem('serginho_carrinho')) || []; 
        let modalProdutoAtual = null;
        let modalQtd = 1;
        let modalAdicionais = {}; 

       function atualizarStatusLoja() {
            const badge = document.getElementById('status-loja');
            
            // BUSCA O COMANDO DO PAINEL ADMIN
            const statusManual = localStorage.getItem('serginho_status_manual');

            if (statusManual === 'fechado') {
                badge.textContent = 'Fechado agora'; 
                badge.className = 'badge-fechado';
                return; // Para a execução aqui
            } 
            
            if (statusManual === 'aberto') {
                badge.textContent = 'Aberto agora'; 
                badge.className = 'badge-aberto';
                return; // Para a execução aqui
            }

            // SE NÃO TIVER COMANDO MANUAL, VOLTA PRO HORÁRIO AUTOMÁTICO
            const data = new Date();
            const dia = data.getDay(); 
            const hora = data.getHours();
            const minuto = data.getMinutes();
            const tempoTotal = (hora * 60) + minuto;
            const abertura = (18 * 60) + 30;
            const fechamento = 23 * 60;
            
            if (dia !== 1 && tempoTotal >= abertura && tempoTotal <= fechamento) {
                badge.textContent = 'Aberto agora'; 
                badge.className = 'badge-aberto';
            } else {
                badge.textContent = 'Fechado agora'; 
                badge.className = 'badge-fechado';
            }
        }

        // Adicionamos um intervalo curto para o site "perceber" a mudança do admin rápido
        setInterval(atualizarStatusLoja, 2000);
        async function buscarCEP() {
            const cep = document.getElementById('cli-cep').value.replace(/\D/g, '');
            const status = document.getElementById('cep-status');
            if (cep.length !== 8) return;
            status.innerText = "Buscando endereço...";
            try {
                const resp = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await resp.json();
                if (!data.erro) {
                    document.getElementById('cli-end').value = data.logradouro;
                    document.getElementById('cli-bairro').value = data.bairro;
                    status.innerText = "";
                    document.getElementById('cli-end').focus();
                } else { status.innerText = "CEP não encontrado."; }
            } catch (e) { status.innerText = "Erro ao buscar CEP."; }
        }

        function initApp() {
            atualizarStatusLoja(); 
            const nav = document.getElementById('nav-categorias');
            const main = document.getElementById('menu-container');
            const categorias = [...new Set(cardapio.map(i => i.cat))];

            categorias.forEach((cat, index) => {
                const idCat = cat.replace(/\s+/g, '-').toLowerCase();
                nav.innerHTML += `<button class="cat-btn ${index === 0 ? 'active' : ''}" data-target="${idCat}" onclick="rolarPara('${idCat}', this)">${cat}</button>`;
                main.innerHTML += `<h2 class="section-title" id="${idCat}">${cat}</h2>`;
                
                cardapio.filter(i => i.cat === cat).forEach(item => {
                    main.innerHTML += `
                        <div class="product-card" onclick="abrirModalProduto('${item.id}')">
                            <div class="product-info">
                                <h3>${item.nome}</h3>
                                <p>${item.desc}</p>
                                <div class="price-row"><span class="price">R$ ${item.preco.toFixed(2).replace('.', ',')}</span></div>
                            </div>
                            <div class="product-img"></div>
                        </div>`;
                });
            });

            // Lógica de Acompanhamento (Scrollspy Inteligente)
            window.addEventListener('scroll', () => {
                const sections = document.querySelectorAll('.section-title');
                const navButtons = document.querySelectorAll('.cat-btn');
                let current = "";

                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    if (pageYOffset >= sectionTop - 120) {
                        current = section.getAttribute('id');
                    }
                });

                navButtons.forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.getAttribute('data-target') === current) {
                        btn.classList.add('active');
                        nav.scrollTo({
                            left: btn.offsetLeft - (nav.offsetWidth / 2) + (btn.offsetWidth / 2),
                            behavior: 'smooth'
                        });
                    }
                });
            });

            atualizarBarra();
        }

        function rolarPara(id, btn) {
            const target = document.getElementById(id);
            const offset = 100;
            const bodyRect = document.body.getBoundingClientRect().top;
            const elementRect = target.getBoundingClientRect().top;
            const elementPosition = elementRect - bodyRect;
            const offsetPosition = elementPosition - offset;

            window.scrollTo({
                top: offsetPosition,
                behavior: "smooth"
            });
        }

        function abrirModalProduto(id) {
            modalProdutoAtual = cardapio.find(i => i.id === id);
            modalQtd = 1; modalAdicionais = {};
            document.getElementById('mp-nome').innerText = modalProdutoAtual.nome;
            document.getElementById('mp-desc').innerText = modalProdutoAtual.desc;
            document.getElementById('mp-qtd').innerText = modalQtd;
            document.getElementById('mp-obs').value = '';

            const lista = document.getElementById('mp-lista-adicionais');
            lista.innerHTML = '';
            if (['Lanches', 'Especiais', 'Porções'].includes(modalProdutoAtual.cat)) {
                document.getElementById('mp-area-adicionais').style.display = 'block';
                acrescimosGlobais.forEach(add => {
                    lista.innerHTML += `
                        <div class="extra-item">
                            <div class="extra-info"><span>${add.nome}</span><small>+ R$ ${add.preco.toFixed(2).replace('.', ',')}</small></div>
                            <div class="mini-qtd">
                                <button onclick="mudarQtdAddon('${add.id}', -1)">-</button>
                                <span id="add-qtd-${add.id}">0</span>
                                <button onclick="mudarQtdAddon('${add.id}', 1)">+</button>
                            </div>
                        </div>`;
                });
            } else { document.getElementById('mp-area-adicionais').style.display = 'none'; }
            calcularTotalModal();
            document.getElementById('modal-produto').style.display = 'flex';
        }

        function mudarQtdAddon(id, delta) {
            modalAdicionais[id] = (modalAdicionais[id] || 0) + delta;
            if (modalAdicionais[id] < 0) modalAdicionais[id] = 0;
            document.getElementById(`add-qtd-${id}`).innerText = modalAdicionais[id];
            calcularTotalModal();
        }

        function calcularTotalModal() {
            let pUnit = modalProdutoAtual.preco;
            for (let id in modalAdicionais) { if (modalAdicionais[id] > 0) pUnit += (acrescimosGlobais.find(a => a.id === id).preco * modalAdicionais[id]); }
            document.getElementById('mp-preco').innerText = `R$ ${pUnit.toFixed(2).replace('.', ',')}`;
            document.getElementById('mp-btn-total').innerText = `R$ ${(pUnit * modalQtd).toFixed(2).replace('.', ',')}`;
        }

        function adicionarNaSacola() {
            let extras = [];
            for (let id in modalAdicionais) { if (modalAdicionais[id] > 0) extras.push({ item: acrescimosGlobais.find(a => a.id === id), qtd: modalAdicionais[id] }); }
            carrinho.push({ item: modalProdutoAtual, extras, obs: document.getElementById('mp-obs').value, qtd: modalQtd });
            localStorage.setItem('serginho_carrinho', JSON.stringify(carrinho));
            atualizarBarra();
            fecharModalProduto();
            mostrarToast();
        }

        function atualizarBarra() {
            let total = 0;
            carrinho.forEach(c => {
                let p = c.item.preco;
                c.extras.forEach(e => p += (e.item.preco * e.qtd));
                total += p * c.qtd;
            });
            document.getElementById('cart-bar').style.display = carrinho.length ? 'flex' : 'none';
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function abrirModalCheckout() {
            const div = document.getElementById('lista-revisao-sacola');
            div.innerHTML = '';
            carrinho.forEach((c, i) => {
                let textoExtras = '';
                if (c.extras && c.extras.length > 0) {
                    textoExtras = `<p style="font-size: 0.8rem; color: var(--text-body); margin-top: 4px;">
                        <i class="fa-solid fa-plus" style="font-size: 0.7rem;"></i> 
                        ${c.extras.map(e => `${e.qtd}x ${e.item.nome}`).join(', ')}
                    </p>`;
                }
                let textoObs = c.obs ? `<p style="font-size: 0.8rem; color: var(--primary); margin-top: 2px;">Obs: ${c.obs}</p>` : '';
                div.innerHTML += `
                    <div class="cart-item-review">
                        <div class="cart-item-info">
                            <h4>${c.qtd}x ${c.item.nome}</h4>
                            ${textoExtras}
                            ${textoObs}
                        </div>
                        <button class="btn-remove" onclick="removerItem(${i})"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
            document.getElementById('modal-checkout').style.display = 'flex';
        }

        function alternarCampos() {
            const tipo = document.getElementById('cli-tipo').value;
            document.getElementById('div-entrega-automatica').style.display = tipo === 'Entrega' ? 'block' : 'none';
            document.getElementById('div-troco').style.display = document.getElementById('cli-pag').value === 'Dinheiro' ? 'block' : 'none';
        }

        function enviarPedido() {
            const nome = document.getElementById('cli-nome').value;
            if(!nome) return alert("Seu nome é necessário!");
            let texto = `*NOVO PEDIDO | SERGINHO LANCHES*\n\n`;
            let total = 0;
            carrinho.forEach(c => {
                let pU = c.item.preco;
                c.extras.forEach(e => pU += (e.item.preco * e.qtd));
                let sub = pU * c.qtd; total += sub;
                texto += `▪️ *${c.qtd}x ${c.item.nome}*\n`;
                if(c.extras.length) texto += `   ➕ Adicionais: ${c.extras.map(e => `${e.qtd}x ${e.item.nome}`).join(', ')}\n`;
                if(c.obs) texto += `   📝 Obs: ${c.obs}\n`;
                texto += `   💵 Sub: R$ ${sub.toFixed(2).replace('.', ',')}\n\n`;
            });
            texto += `💰 *TOTAL: R$ ${total.toFixed(2).replace('.', ',')}*\n\n`;
            texto += `👤 Cliente: ${nome}\n🛵 Tipo: ${document.getElementById('cli-tipo').value}\n`;
            if(document.getElementById('cli-tipo').value === 'Entrega') {
                texto += `📍 Endereço: ${document.getElementById('cli-end').value}, ${document.getElementById('cli-bairro').value}\n(CEP: ${document.getElementById('cli-cep').value})\n`;
            }
            texto += `💳 Pagamento: ${document.getElementById('cli-pag').value}`;
            window.open(`https://wa.me/${WPP_NUMERO}?text=${encodeURIComponent(texto)}`, '_blank');
            carrinho = []; localStorage.removeItem('serginho_carrinho'); atualizarBarra();
        }

        function fecharModalProduto() { document.getElementById('modal-produto').style.display = 'none'; }
        function fecharModalCheckout() { document.getElementById('modal-checkout').style.display = 'none'; }
        function mudarQtdModal(d) { modalQtd = Math.max(1, modalQtd + d); document.getElementById('mp-qtd').innerText = modalQtd; calcularTotalModal(); }
        function mostrarToast() { const t = document.getElementById("toast"); t.className = "show"; setTimeout(() => t.className = "", 3000); }
        function removerItem(i) { 
            carrinho.splice(i, 1); 
            localStorage.setItem('serginho_carrinho', JSON.stringify(carrinho));
            atualizarBarra(); 
            abrirModalCheckout(); 
        }

        initApp();
    </script>
</body>
</html>
